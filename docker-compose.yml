services:
  postgres:
    image: postgres:16
    container_name: movibot-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-movibot}
      POSTGRES_USER: ${POSTGRES_USER:-movibot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-movibot}
    volumes:
      - movibot-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-movibot} -d ${POSTGRES_DB:-movibot}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  movibot-postgres-data: